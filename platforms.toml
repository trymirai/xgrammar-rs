[envs]
MACOSX_DEPLOYMENT_TARGET = "14.0"
IPHONEOS_DEPLOYMENT_TARGET = "17.0"

[tools]
swift = { provider = "cargo", version = "0.11.0" }
zigbuild = { provider = "cargo", version = "0.22.3" }
xwin = { provider = "cargo", version = "0.22.0" }
ziglang = { provider = "uv", version = "0.16.0" }
maturin = { provider = "uv", version = "1.7" }

[targets."aarch64-apple-darwin"]
aliases = ["apple", "macos"]
required_envs = ["MACOSX_DEPLOYMENT_TARGET"]

[targets."x86_64-apple-darwin"]
aliases = ["apple", "macos-intel"]
required_envs = ["MACOSX_DEPLOYMENT_TARGET"]

[targets."aarch64-apple-ios"]
aliases = ["apple", "ios"]
required_envs = ["IPHONEOS_DEPLOYMENT_TARGET"]

[targets."aarch64-apple-ios-sim"]
aliases = ["apple", "ios-sim", "ios-simulator"]
required_envs = ["IPHONEOS_DEPLOYMENT_TARGET"]

[targets."aarch64-unknown-linux-gnu"]
aliases = ["linux"]

[targets."x86_64-unknown-linux-gnu"]
aliases = ["linux"]

[targets."aarch64-pc-windows-msvc"]
aliases = ["windows"]

[targets."x86_64-pc-windows-msvc"]
aliases = ["windows"]

[targets."wasm32-unknown-unknown"]
aliases = ["wasm"]

[languages.python]
targets = ["aarch64-apple-darwin", "x86_64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-unknown-linux-gnu"]
tools = ["maturin"]
bindings = ["pyo3"]
examples_path = "bindings/python/examples"

[languages.swift]
targets = ["aarch64-apple-darwin", "aarch64-apple-ios", "aarch64-apple-ios-sim"]
tools = ["swift"]
bindings = ["uniffi"]
examples_path = "bindings/swift/Sources/Examples"

[languages.typescript]
targets = ["aarch64-apple-darwin", "x86_64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-unknown-linux-gnu"]
tools = ["zigbuild", "xwin"]
bindings = ["napi"]
examples_path = "bindings/typescript/examples"
